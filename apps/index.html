<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoSmart | Dashboard</title>
</head>
<body>
    <aside class="sidebar">
        <div class="nav-item">Dashboard</div>
        <div class="nav-item">Registrar Descarte</div>
        <div class="nav-item">Histórico</div>
        <div class="nav-item">Impacto Ambiental</div>
        <div class="nav-item">Conteúdo Educativo</div>
        <div class="nav-item">Pontos de Coleta</div>
        <div class="nav-item">Pedidos de Coleta</div>
        <div class="nav-item">Notificações</div>
        <div class="nav-item">Perfil</div>
    </aside>

    <main class="main-content">
        <h1>Olá, Maria</h1>
        <h5>Bem vindo ao painel de sustentabilidade</h5>

        <div class="stats-grid">
            <div class="stats-grid">
                <small>Total de Descartes</small>
                <h3>4</h3>
            </div>
            <div class="stats-grid">
                <small>Material Reciclado</small>
                <h3>13 Kg</h3>
            </div>
            <div class="stats-grid">
                <small>Sua Pontuação</small>
                <h3>150</h3>
            </div>
            <div class="stats-grid">
                <small>CO² Evitado</small>
                <h3></h3>
            </div>            
        </div>
        <section class="form-section">
            <h3>Registrar Descarte</h3>
            <form>
                <div>
                    <div>
                        <label>Tipo de material</label><br>
                        <select>
                            <option>Plastic</option>
                        </select>
                    </div>
                </div>
            </form>
        </section>

    </main>
</body>
</html>
